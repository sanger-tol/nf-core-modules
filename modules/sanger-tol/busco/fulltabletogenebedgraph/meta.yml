name: "fulltabletogenebedgraph"
description: |
  Parse BUSCO genome-mode full_table.tsv and write three prefixed bedGraph files
  (Complete, Duplicated, Fragmented), sorted by sequence and numeric start; score is 100.
keywords:
  - busco
  - bedgraph
  - genome
tools:
  - busco_fulltable_to_bedgraph:
      description: |
        Convert BUSCO full_table.tsv genomic coordinates into sorted per-status bedGraph files.
        Output filenames use `task.ext.prefix` (default `meta.id`), e.g. `sample.complete_buscos.bedgraph`.
      homepage: https://github.com/sanger-tol/nf-core-modules
      documentation: https://github.com/sanger-tol/nf-core-modules
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - full_table:
        type: file
        description: BUSCO full_table.tsv (genome mode)
        pattern: "full_table.tsv"
output:
  complete_bedgraph:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.complete_buscos.bedgraph":
          type: file
          description: Intervals for BUSCO status Complete (sequence, start, end, score)
          pattern: "*.complete_buscos.bedgraph"
  duplicated_bedgraph:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.duplicated_buscos.bedgraph":
          type: file
          description: Intervals for BUSCO status Duplicated (sequence, start, end, score)
          pattern: "*.duplicated_buscos.bedgraph"
  fragmented_bedgraph:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.fragmented_buscos.bedgraph":
          type: file
          description: Intervals for BUSCO status Fragmented (sequence, start, end, score)
          pattern: "*.fragmented_buscos.bedgraph"
  versions_python:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - 'python -c "import sys; print(sys.version.split()[0])"':
          type: eval
          description: The expression to obtain the version of the tool
  versions_pandas:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - pandas:
          type: string
          description: The tool name
      - 'python -c "import pandas as pd; print(pd.__version__)"':
          type: eval
          description: The expression to obtain the version of the tool
  versions_busco_fulltable_to_bedgraph:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - busco_fulltable_to_bedgraph:
          type: string
          description: The tool name
      - "python ${moduleDir}/resources/usr/bin/busco_fulltable_to_bedgraph --version | sed 's/^.* //'":
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - python:
          type: string
          description: The tool name
      - 'python -c "import sys; print(sys.version.split()[0])"':
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - pandas:
          type: string
          description: The tool name
      - 'python -c "import pandas as pd; print(pd.__version__)"':
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - busco_fulltable_to_bedgraph:
          type: string
          description: The tool name
      - "python ${moduleDir}/resources/usr/bin/busco_fulltable_to_bedgraph --version | sed 's/^.* //'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@yumisims"
maintainers:
  - "@yumisims"
