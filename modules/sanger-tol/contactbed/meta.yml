# yaml-language-server: $schema=https://raw.githubusercontent.com/sanger-tol/nf-core-modules/main/modules/meta-schema.json
name: "contactbed"
description: |
  Converts BED file to contacts BED format using shell utilities.
keywords:
  - contacts
  - bed
  - hic
  - pairs
tools:
  - coreutils:
      description: |
        GNU coreutils provides standard utilities such as paste and tr used during conversion.
      homepage: https://www.gnu.org/software/coreutils/
      licence:
        - "GPL v3.0"
      identifier: ""
  - gawk:
      description: |
        AWK is used to transform BED records into the contacts format.
      homepage: https://gnu.org/software/gawk/
      licence:
        - "GPL v3.0"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - file:
        type: file
        description: |
          BED file to convert to contacts format.
        pattern: "*.bed"
        ontologies:
          - edam: http://edamontology.org/format_3003 # BED
output:
  bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.bed":
          type: file
          description: |
            Contacts BED file generated from the input BED file.
          pattern: "*.bed"
          ontologies:
            - edam: http://edamontology.org/format_3003  BED
  versions_coreutils:
    - - ${task.process}:
          type: string
          description: The name of the process
      - coreutils:
          type: string
          description: The name of the tool
      - ls --version | sed -n "s/ls (GNU coreutils) //p":
          type: eval
          description: The expression to obtain the version of the tool
  versions_gawk:
    - - ${task.process}:
          type: string
          description: The name of the process
      - gawk:
          type: string
          description: The name of the tool
      - gawk --version | grep -o -E "[0-9]+(.[0-9]+)+" | head -n1:
          type: eval
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - coreutils:
          type: string
          description: The name of the tool
      - ls --version | sed -n "s/ls (GNU coreutils) //p":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: The name of the process
      - gawk:
          type: string
          description: The name of the tool
      - gawk --version | grep -o -E "[0-9]+(.[0-9]+)+" | head -n1:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@sanger-tol"
maintainers:
  - "@sanger-tol"
