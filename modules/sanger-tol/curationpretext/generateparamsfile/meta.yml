# yaml-language-server: $schema=https://raw.githubusercontent.com/sanger-tol/nf-core-modules/main/modules/meta-schema.json
name: "CURATIONPRETEXT_GENERATEPARAMSFILE"
description: Generate a params file in json format for
  sanger-tol/curationpretext
keywords:
  - curationpretext/generateparamsfile
  - generateparamsfile
  - json
  - paramsfile
tools:
  - "curationpretext_generateparamsfile":
      description: "A samplesheet generator for the CurationPretext pipeline"
      homepage: "https://pipelines.tol.sanger.ac.uk/curationpretext"
      documentation: "https://pipelines.tol.sanger.ac.uk/curationpretext"
      tool_dev_url: "https://pipelines.tol.sanger.ac.uk/curationpretext/usage"
      doi: 10.5281/zenodo.12773958
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - reference:
        type: file
        description: |
          Input assembly fasta file
        pattern: "[*.{fasta,fa,fna}]"
        ontologies:
          - edam: "http://edamontology.org/format_1929" # FASTA
  - longread_dir:
      type: directory
      description: |
        Directory containing longread fa(asta).gz files
      ontologies: []
  - cram_dir:
      type: directory
      description: |
        Directory containing hic cram files
      ontologies: []
  - telomere_motif:
      type: string
      description: |
        A telomere motif string
      ontologies: []
  - aligner:
      type: string
      description: |
        Aligner to be used (minimap2, bwamem2, AUTO)
      ontologies: []
  - cpretext_extra_opts:
      type: map
      description: |
        Map of extra arguments for curationpretext
      ontologies: []
output:
  json_params_file:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.json":
          type: file
          description: JSON params file required for CurationPretext
          ontologies:
            - edam: "http://edamontology.org/format_3464" # JSON
  versions_curationpretextgenerateparamsfile:
    - - ${task.process}:
          type: string
          description: The name of the process
      - curationpretext_generateparamsfile:
          type: string
          description: The name of the tool
      - 1.0.0:
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - curationpretext_generateparamsfile:
          type: string
          description: The name of the tool
      - 1.0.0:
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@mahesh-panchal"
  - "@DLBPointon"
maintainers:
  - "@DLBPointon"
