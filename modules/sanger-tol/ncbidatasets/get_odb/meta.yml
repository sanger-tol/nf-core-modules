# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "NCBIDATASETS_GET_ODB"
description: |
  A tool to collect ODB lineages using NCBI Datasets summaries.
keywords:
  - assembly
  - summary
  - ncbi_datasets
  - get_odb
tools:
  - "get_odb":
      description: |
        Generate a CSV containing relevant ODB's to run for a given assembly.
      homepage: "https://github.com/sanger-tol/nf-core-modules"
      documentation: "https://github.com/sanger-tol/nf-core-modules"
      tool_dev_url: "https://github.com/sanger-tol/nf-core-modules"
      licence: ["MIT"]
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - ncbi_summary:
        type: file
        description: Assembly summary file
        pattern: "*.json"
        ontologies:
          - edam: "http://edamontology.org/format_3464" # JSON
  - odb_dir:
      type: directory
      description: Directory containing the ODB lineage data. Do not include the lineage subdirectory.
  - odb_version:
      type: string
      description: Whether the user wants to use odb10 or odb12.
      pattern: "^(odb10|odb12)$"
  - mode:
      type: string
      description: Mode of operation, "specified", "specified_and_basal", "basal_only", "best", "best_and_basal", "ancestral" and "ancestral_and_basal".
  - specified_lineages:
      type: string
      description: CSV list of specifiied lineages by user.
output:
  csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.busco_odb.csv":
          type: file
          description: CSV file containing relevant ODB lineages for the assembly
          pattern: "*.busco_odb.csv"
          ontologies:
            - edam: "http://edamontology.org/format_3307" # CSV
  versions_python:
    - - ${task.process}:
          type: string
          description: Name of the process
      - python:
          type: string
          description: Name of the tool
      - python --version | sed "s/Python //":
          type: eval
          description: The expression to obtain the version of the tool
  versions_get_odb:
    - - ${task.process}:
          type: string
          description: Name of the process
      - get_odb.py:
          type: string
          description: Name of the tool
      - get_odb.py --version | cut -d" " -f2:
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - ${task.process}:
          type: string
          description: Name of the process
      - python:
          type: string
          description: Name of the tool
      - python --version | sed "s/Python //":
          type: eval
          description: The expression to obtain the version of the tool
    - - ${task.process}:
          type: string
          description: Name of the process
      - get_odb.py:
          type: string
          description: Name of the tool
      - get_odb.py --version | cut -d" " -f2:
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@DLBPointon"
maintainers:
  - "@DLBPointon"
