name: "pretext_pretext2asm"
description: |
  Convert a PretextView-curated AGP file and input assembly FASTA into a corrected AGP
  using agp-tpf-utils `pretext-to-asm`.
keywords:
  - pretext
  - agp
  - assembly
  - curation
  - hic
tools:
  - agp-tpf-utils:
      description: |
        Utilities for Tree of Life AGP and TPF assembly files. This module runs
        `pretext-to-asm` to remap a PretextView AGP onto the input assembly.
        Output filename uses `task.ext.prefix` (default `meta.id`), e.g.
        `sample_corrected.hap1.1.primary.curated.agp` when haplotype tags are present.
      homepage: https://github.com/sanger-tol/agp-tpf-utils
      documentation: https://github.com/sanger-tol/agp-tpf-utils
      tool_dev_url: https://github.com/sanger-tol/agp-tpf-utils
      licence:
        - "MIT"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - mappedfasta:
        type: file
        description: Input assembly FASTA used for Pretext mapping
        pattern: "*.{fa,fna,fasta}"
        ontologies:
          - edam: http://edamontology.org/format_1929 # FASTA
  - pretextagp:
      type: file
      description: AGP file exported from PretextView after manual curation
      pattern: "*.agp"
      ontologies:
        - edam: "http://edamontology.org/format_3693" # AGP
output:
  correctedagp:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - ${meta.id}_corrected*.agp:
          type: file
          description: Corrected AGP assembly coordinates after Pretext curation
          pattern: "${meta.id}_corrected*.agp"
          ontologies:
            - edam: "http://edamontology.org/format_3693" # AGP
  versions_agp_tpf_utils:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - tola-agp-tpf-utils:
          type: string
          description: The tool name
      - "1.3.4":
          type: string
          description: The expression to obtain the version of the tool
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The process the versions were collected from
      - tola-agp-tpf-utils:
          type: string
          description: The tool name
      - "1.3.4":
          type: string
          description: The expression to obtain the version of the tool
authors:
  - "@yumisims"
maintainers:
  - "@yumisims"
