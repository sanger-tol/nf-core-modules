name: "telomere_windows"
description: |
  Identify windows of the telomere file which maybe true telomeric sites.
  Wraps [FindTelomereWindows](https://github.com/sanger-tol/telomere/blob/main/FindTelomereWindows.java) (`java -cp telomere.jar FindTelomereWindows`).

  **Without `--split` (`split: false`):** positional arguments are `<in> <identity> [threshold]`.
  `<identity>` is a percentage (e.g. `99.9` → internally divided by 100). If `[threshold]` is omitted,
  the program uses default `0.4`, then applies the identity-based adjustment described in the tool.
  Window lines are written to **stdout**; this module redirects them to `${prefix}.windows`.

  **With `--split` (`split: true`):** invocation is `--split <in> <identity> [threshold]`.
  If `[threshold]` is omitted, default is `0.05` before the same identity adjustment. The program writes
  **two files**: `<stem>.fwd.windows` and `<stem>.rev.windows`, where `<stem>` is the input path with a
  trailing `.telomere` removed (otherwise the full input basename). Stdout redirection is not used.

  Override `<identity> [threshold]` via process `ext.args` (default `99.9 0.1`).
  `telomere.jar` is resolved like in `telomere/findtelomere`, or set explicitly via `process.ext.telomere_jar`.
keywords:
  - telomere
  - windows
  - tsv
tools:
  - telomere.jar:
      description: |
        Script to identify likely telomeric sites.
      homepage: https://github.com/VGP/vgp-assembly/
      documentation: https://github.com/VGP/vgp-assembly/
      licence:
        - "GPL v2.0"
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - telomere:
        type: file
        description: |
          TSV of putative telomeric sites
        pattern: "*.telomere"
        ontologies:
          - edam: "http://edamontology.org/format_3475"
    - split:
        type: boolean
        description: |
          When true, pass `--split` before the telomere path (split-mode invocation).
output:
  windows:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.windows":
          type: file
          description: |
            TSV of likely telomeric sites
          ontologies:
            - edam: "http://edamontology.org/format_3475"
  versions_telomerewindows:
    - - ${task.process}:
          type: string
          description: The name of the process
      - find_telomere_windows:
          type: string
          description: The name of the tool
      - 1.0.0:
          type: string
          description: The version of the module
topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - find_telomere_windows:
          type: string
          description: The name of the tool
      - 1.0.0:
          type: string
          description: The version of the module
authors:
  - "@DLBPointon"
maintainers:
  - "@DLBPointon"
