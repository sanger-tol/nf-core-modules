# yaml-language-server: $schema=https://raw.githubusercontent.com/sanger-tol/nf-core-modules/main/subworkflows/yaml-schema.json
name: "contact_maps_ingest_tracks"
description: |
        Build contact maps from pairs files using PretextMap,
        Juicertools, and Cooler and then ingest accessory files into the
        pretext file.
keywords:
  - pairs
  - contact map
  - hic
  - pretextgraph
  - gap
  - repeat
  - telomere
  - coverage
components:
  - cooler/cload:
      git_remote: https://github.com/nf-core/modules.git
  - cooler/zoomify:
      git_remote: https://github.com/nf-core/modules.git
  - gawk:
      git_remote: https://github.com/nf-core/modules.git
  - juicertools/pre:
      git_remote: https://github.com/nf-core/modules.git
  - pretextmap:
      git_remote: https://github.com/nf-core/modules.git
  - pretextsnapshot:
      git_remote: https://github.com/nf-core/modules.git
input:
  - ch_pairs:
      type: file
      description: |
        Input Hi-C pairs in pairs format (https://github.com/4dn-dcic/pairix/blob/master/pairs_format_specification.md).

        Structure: [ val(meta), path(pairs) ]
      pattern: "*.pairs.gz"
  - ch_chrom_sizes:
      type: file
      description: |
        Input chromosome sizes file - a TSV with two columns, name and size.

        Structure: [ val(meta), path(sizes) ]
      pattern: "*.{sizes,tsv}"
  - ch_custom_order:
      type: file
      description: |
        Input custom order file - a txt file of new line separated chromosome names.

        Structure: [ val(meta), path(order) ]
      pattern: "*.txt"
  - ch_gap_file:
      type: file
      description: |
        File containing gap sites

        Structure: [ val(meta), path(gap) ]
      pattern: "*.bed"
  - ch_coverage:
      type: file
      description: |
        File containing coverage data

        Structure: [ val(meta), path(coverage) ]
      pattern: "*.bw"
  - ch_telo_file:
      type: file
      description: |
        File containing telomere site data

        Structure: [ val(meta), path(telomere) ]
      pattern: "*.bedgraph"
  - ch_repeat_density:
      type: file
      description: |
        File containing repeat density data

        Structure: [ val(meta), path(repeat_density) ]
      pattern: "*.bw"
  - val_build_pretext:
      type: boolean
      description: Build a PretextMap contact map
  - val_create_pretext_snapshot:
      type: boolean
      description: Create a snapshot of the PretextMap contact map
  - val_build_cooler:
      type: boolean
      description: Build a Cooler contact map
  - val_build_juicer:
      type: boolean
      description: Build a Juicer contact map
  - val_cool_bin:
      type: integer
      description: Bin size for cooler
  - val_ingest_tracks:
      type: boolean
      description: Ingest the accessory tracks into the contact map
output:
  - pretext_map:
      type: file
      description: |
        Contact map in PretextMap format.
        Structure: [ val(meta), path(pretext) ]
      pattern: "*.pretext"
  - pretext_map_with_tracks:
      type: file
      description: |
        Contact map in PretextMap format with ingested accessory tracks.
        Structure: [ val(meta), path(pretext) ]
      pattern: "*.pretext"
  - pretext_png:
      type: file
      description: |
        PNG visualisation of the Pretext contact map.
        Structure: [ val(meta), path(png) ]
      pattern: "*.png"
  - cool:
      type: file
      description: |
        Contact map in mCooler format
        Structure: [ val(meta), path(mcool) ]
      pattern: "*.mcool"
  - hic:
      type: file
      description: |
        Contact map in Juicer format
        Structure: [ val(meta), path(hic) ]
      pattern: "*.hic"
authors:
  - "@DLBPointon"
maintainers:
  - "@DLBPointon"
