# yaml-language-server: $schema=https://raw.githubusercontent.com/sanger-tol/nf-core-modules/main/subworkflows/yaml-schema.json
name: "odbsearch_busco_restructure"
description: Runs BUSCO with the relevant lineages
keywords:
  - sanger-tol/busco
  - odbsearch
  - restructure
  - busco
components:
  - apiscripts/getlineageodbs
  - busco/busco
  - restructurebuscodir
input:
  - ch_reference:
      type: file
      description: |
        Structure: [ val(meta), path(pairs) ]
      pattern: "*.(fasta|fa|fna)"
  - val_odb_directory:
      type: string
      description: |
        Path to directory containing `lineages` folder)
  - val_mapping_directory:
      type: string
      description: |
        Path to busco_odb_mapping folder, shipped with APISCRIPTS_GETLINEAGEODBS
  - val_output_dir:
      type: string
      description: Output directory for the restructure busco directory
  - val_restructure_busco_dir:
      type: boolean
      description: Whether to restructure the busco directory
output:
  - odb_csv:
      type: file
      description: |
        CSV file containing the ODB search results.
        Structure: [ val(meta), path(pretext) ]
      pattern: "*.csv"
  - busco_full_table:
      type: file
      description: |
        BUSCO full table files
        Structure: [ val(meta), path(busco_full_table) ]
      pattern: "*.tsv"
  - busco_output:
      type: dir
      description: |
        Directory containing the BUSCO output files.
        Structure: [ val(meta), path(busco_output) ]
      pattern: "*"
  - restructured_output:
      type: dir
      description: |
        Restructured output directory containing the BUSCO output files.
        Structure: [ val(meta), path(output_directory) ]
authors:
  - "@DLBPointon"
maintainers:
  - "@DLBPointon"
