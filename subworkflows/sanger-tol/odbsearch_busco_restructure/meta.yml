# yaml-language-server: $schema=https://raw.githubusercontent.com/sanger-tol/nf-core-modules/main/subworkflows/yaml-schema.json
name: "odbsearch_busco_restructure"
description: Build contact maps from pairs files using PretextMap, Juicertools, and Cooler
keywords:
  - busco
  - odbsearch
  - restructure
  - gunzip
components:
  - api_search/get_lineage_odbs
  - busco/busco
  - restructurebuscodir
  - gunzip:
      git_remote: https://github.com/nf-core/modules.git
input:
  - ch_reference:
      type: file
      description: |
        Structure: [ val(meta), path(pairs) ]
      pattern: "*.(fasta|fa|fna)"
  - val_odb_directory:
      type: string
      description: |
        Input ODB directory - a directory containing ODB files.
  - val_mapping_directory:
      type: string
      description: |
        Input custom order file - a txt file of new line separated chromosome names.
  - val_taxid:
      type: number
      description: Taxid of the input species
  - val_specified_lineages:
      type: string
      description: |
        A CSV string of additional lineages to run busco with.
  - val_output_dir:
      type: string
      description: Output directory for the restructure busco directory
  - val_restructure_busco_dir:
      type: boolean
      description: Whether to restructure the busco directory
output:
  - odb_csv:
      type: file
      description: |
        CSV file containing the ODB search results.
        Structure: [ val(meta), path(pretext) ]
      pattern: "*.csv"
  - busco_full_table:
      type: file
      description: |
        BUSCO full table files
        Structure: [ val(meta), path(busco_full_table) ]
      pattern: "*.tsv"
  - busco_output:
      type: dir
      description: |
        Directory containing the BUSCO output files.
        Structure: [ val(meta), path(busco_output) ]
      pattern: "*"
  - restructured_output:
      type: dir
      description: |
        Restructured output directory containing the contact map in mCooler format.
        Structure: [ val(meta), path(output_directory) ]
authors:
  - "@DLBPointon"
maintainers:
  - "@DLBPointon"
