# yaml-language-server: $schema=https://raw.githubusercontent.com/sanger-tol/nf-core-modules/main/subworkflows/yaml-schema.json
name: "pretext_track_generation"
description: Generate tracks required for ingestion into Pretext
keywords:
  - bed
  - pretext
  - bigWig
components:
  - gap_finder
  - telo_finder
  - read_coverage
  - repeat_density
  - repeat_masking
  - feature_density
  - telomere/findtelomere
  - find/concatenate
  - bedtools/genomecov
  - minimap2/align
  - seqtk/cutn
  - gawk
  - tabix/bgziptabix
  - windowmasker/ustat
  - windowmasker/mkcounts
  - gnu/sort
  - ucsc/bedgraphtobigwig
  - bedtools/intersect
  - bedtools/makewindows
  - bedtools/map

input:
  - ch_reference_tuple:
      type: file
      description: |
        Structure [ val(meta), path(reference) ]
        Meta is the Groovy Map containing sample information
        Reference is the fasta for analysis
  - ch_reference_sizes:
      type: file
      description: |
        Structure [ val(meta), path(sizes) ]
        Meta is the Groovy Map containing sample information
        Sizes is the file containing chromosome sizes
  - ch_longread_reads:
      type: list
      description: |
        Structure [ val(meta), path(sizes) ]
        Meta is the Groovy Map containing sample information
        Collection of long read reads to use for alignment
  - val_teloseq:
      type: string
      description: |
        Telomeric motif for use in telo_finder
    val_run_gap_finder:
      type: boolean
      description: |
        Whether to run gap_finder
    val_run_telo_finder:
      type: boolean
      description: |
        Whether to run telo_finder
    val_run_repeat_density:
      type: boolean
      description: |
        Whether to run repeat_density
    val_run_coverage:
      type: boolean
      description: |
        Whether to run read_coverage
    val_split_telomere:
      type: boolean
      description: |
        Whether telomere files should be split into forward and reverse telomeric hit files
output:
  - gap_file:
      type: file
      description: |
        BED file generated by gap_finder
        Structure: [ val(meta), path(bed) ]
      pattern: "*.bed"
  - repeat_file:
      type: file
      description: |
        BED file generated by repeat_density
        Structure: [ val(meta), path(bed) ]
      pattern: "*.bed"
  - telo_file:
      type: file
      description: |
        BED file generated by gap_finder
        Structure: [ val(meta), path(bedgraph) ]
      pattern: "*.bedgraph"
  - coverage_output:
      type: file
      description: |
        BigWig file generated by read_coverage
        Structure: [ val(meta), path(bigwig) ]
      pattern: "*.bigwig"

authors:
  - "@DLBPointon"
maintainers:
  - "@DLBPointon"
