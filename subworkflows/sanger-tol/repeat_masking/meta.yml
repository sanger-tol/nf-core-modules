# yaml-language-server: $schema=https://raw.githubusercontent.com/sanger-tol/nf-core-modules/refs/heads/main/subworkflows/yaml-schema.json
name: "repeat_density"
description: Generate a bigwig file containing repeat density graph
keywords:
  - repeat
  - windowmaker
  - markup
  - statistics
components:
  - windowmasker/ustat:
      git_remote: https://github.com/nf-core/modules.git
  - windowmasker/mkcounts:
      git_remote: https://github.com/nf-core/modules.git
  - gunzip:
      git_remote: https://github.com/nf-core/modules.git

input:
  - ch_reference:
      type: file
      description: |
        Structure [ val(meta), path(reference) ]
        Meta is the Groovy Map containing sample information
        Reference is the fasta for analysis

output:
  - repeat_intervals:
      type: file
      description: |
        Structure: [ val(meta), path(repeat_density) ]
        Repeat intervals file

authors:
  - "@DLBPointon"
maintainers:
  - "@DLBPointon"
