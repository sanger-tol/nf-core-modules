# yaml-language-server: $schema=https://raw.githubusercontent.com/sanger-tol/nf-core-modules/main/subworkflows/yaml-schema.json
name: "telo_finder"
description: |
  Run `telomere/findtelomere` on an assembly and motif string; optionally bgzip/tabix strand BED
  (`*.fwd.telomere.bed`, `*.rev.telomere.bed`) and windows files (`*.windows` or `*.fwd.windows` /
  `*.rev.windows`).
keywords:
  - telomere
  - windows
  - regions
  - fasta
  - tabix
components:
  - telomere/findtelomere
  - htslib/bgziptabix:
      git_remote: https://github.com/nf-core/modules.git
input:
  - ch_reference:
      type: file
      description: |
        Channel shape `[ val(meta), path(reference) ]`.
  - ch_telomereseq:
      type: string
      description: |
        Channel shape `[ val(meta), val(telomere_motif) ]` â€” DNA motif sequence string (same `meta.id`
        as `ch_reference` entries).
  - val_split_telomere:
      type: boolean
      description: |
        When true, run `FindTelomereWindows` in `--split` mode (`*.fwd.windows`, `*.rev.windows`).
        When false, emit a single `*.windows` file.
  - val_zip_bed:
      type: boolean
      description: |
        When true, run `htslib/bgziptabix` on strand telomere BED outputs and all windows files from
        this sample (one HTSLIB task per file). When false, `gz_index` is an empty channel.
output:
  - telomere:
      type: file
      description: |
        `[ val(meta), path(*.telomere) ]` â€” merged motif-hit table from `find_telomere`.
  - telomere_bed_fwd:
      type: file
      description: |
        `[ val(meta), path(*.fwd.telomere.bed) ]` (optional if tool emits).
  - telomere_bed_rev:
      type: file
      description: |
        `[ val(meta), path(*.rev.telomere.bed) ]` (optional if tool emits).
  - windows_all:
      type: file
      description: |
        `[ val(meta), path(*.all.windows) ]` when `val_split_telomere` is false; otherwise empty.
  - windows_fwd:
      type: file
      description: |
        `[ val(meta), path(*.fwd.windows) ]` when split is true; otherwise empty.
  - windows_rev:
      type: file
      description: |
        `[ val(meta), path(*.rev.windows) ]` when split is true; otherwise empty.
  - gz_index:
      type: file
      description: |
        `[ val(meta), path(*.gz), path(*.{tbi,csi}) ]` per bgzip/tabixed file when `val_zip_bed` is true
        (from `HTSLIB_BGZIPTABIX` output/index join); empty when `val_zip_bed` is false.

authors:
  - "@yumisims"
  - "@DLBPointon"
  - "@weaglesBio"
maintainers:
  - "@yumisims"
  - "@DLBPointon"
  - "@weaglesBio"
